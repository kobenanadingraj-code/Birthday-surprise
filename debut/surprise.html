<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise 💎🌸</title>
<meta property="og:title" content="Une surprise pour toi 💎">
<meta property="og:description" content="Quelqu'un a créé quelque chose de spécial rien que pour toi…">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --rose:#f2c4ce;--rose-deep:#d4788a;--rose-soft:#fce8ed;
  --emerald:#1a6b47;--emerald-mid:#2ecc8b;
  --gold:#b8892a;--gold-light:#e8c06a;
  --text-dark:#3a1f2a;--text-mid:#7a4a5a;--text-soft:#b08090;
}

body{
  background:linear-gradient(160deg,#fff4f7 0%,#fce8ed 40%,#e8f5f0 100%);
  min-height:100vh;font-family:'Cormorant Garamond',serif;color:var(--text-dark);
  overflow-x:hidden;
}

/* PETALS */
.petal{position:fixed;border-radius:50% 0 50% 0;opacity:0;pointer-events:none;animation:petalFall linear infinite;}
@keyframes petalFall{0%{transform:translateY(-40px) rotate(0deg);opacity:0;}10%{opacity:.35;}90%{opacity:.15;}100%{transform:translateY(110vh) rotate(360deg);opacity:0;}}

/* ERROR */
.error-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px;}
.error-box{font-family:'Playfair Display',serif;color:var(--text-soft);}
.error-box h2{font-size:1.6rem;margin-bottom:12px;color:var(--text-mid);}

/* MAIN */
.page{max-width:640px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1;}

/* ENVELOPE INTRO */
.envelope-screen{
  position:fixed;inset:0;z-index:100;
  background:linear-gradient(160deg,#fff4f7,#fce8ed,#e8f5f0);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;
  transition:opacity .8s ease;
}
.envelope-screen.gone{opacity:0;pointer-events:none;}
.env-gem{animation:gemFloat 3s ease-in-out infinite;filter:drop-shadow(0 6px 20px rgba(46,204,139,.4)) drop-shadow(0 2px 8px rgba(210,120,138,.3));}
@keyframes gemFloat{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-10px) rotate(2deg);}}
.env-title{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,5vw,2.4rem);font-weight:700;background:linear-gradient(135deg,var(--emerald),var(--emerald-mid),var(--rose-deep));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:22px 0 10px;text-align:center;}
.env-sub{font-style:italic;color:var(--text-soft);letter-spacing:.12em;font-size:.95rem;text-align:center;}
.env-click{margin-top:30px;padding:14px 34px;background:linear-gradient(135deg,var(--emerald),#0d4d32);border:none;border-radius:50px;color:#fff;font-family:'Playfair Display',serif;font-size:1rem;letter-spacing:.08em;cursor:pointer;animation:btnPulse 2s ease-in-out infinite;box-shadow:0 4px 20px rgba(26,107,71,.3);}
@keyframes btnPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}

/* NAME */
.surprise-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.8rem,9vw,5rem);
  font-weight:700;
  background:linear-gradient(135deg,var(--emerald) 0%,var(--emerald-mid) 45%,var(--rose-deep) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;
  letter-spacing:.03em;
  margin-bottom:8px;
  opacity:0;animation:nameReveal 1.2s ease .3s both;
}
@keyframes nameReveal{from{opacity:0;letter-spacing:.4em;}to{opacity:1;letter-spacing:.03em;}}

.hbd-line{
  text-align:center;font-style:italic;
  font-size:1.1rem;letter-spacing:.2em;
  color:var(--text-soft);margin-bottom:36px;
  opacity:0;animation:fadeIn .8s ease .8s both;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* GEM CENTER */
.gem-center{display:flex;justify-content:center;margin-bottom:32px;opacity:0;animation:fadeIn .8s ease .2s both;}
.gem-center svg{filter:drop-shadow(0 6px 20px rgba(46,204,139,.45)) drop-shadow(0 2px 10px rgba(210,120,138,.3));animation:gemFloat 4s ease-in-out infinite;}

/* DIAPO */
.diapo-wrap{
  position:relative;width:100%;max-width:460px;
  margin:0 auto 12px;aspect-ratio:1;
  border-radius:20px;overflow:hidden;
  border:1px solid rgba(212,120,138,.22);
  box-shadow:0 6px 32px rgba(210,120,138,.18),0 2px 10px rgba(26,107,71,.1);
  background:#fce8ed;
  opacity:0;animation:fadeIn .8s ease 1s both;
}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 1s ease;display:flex;align-items:center;justify-content:center;}
.slide.active{opacity:1;z-index:2;}
.slide img{width:100%;height:100%;object-fit:cover;}
.slide video{width:100%;height:100%;object-fit:cover;}
.slide-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.1) 0%,transparent 28%,transparent 72%,rgba(0,0,0,.12) 100%);pointer-events:none;z-index:3;}
.slide-badge{position:absolute;top:10px;left:10px;z-index:10;background:rgba(255,255,255,.82);backdrop-filter:blur(4px);border-radius:7px;padding:3px 9px;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--emerald);font-family:'Playfair Display',serif;}
.diapo-btn{position:absolute;top:50%;transform:translateY(-50%);z-index:10;background:rgba(255,255,255,.75);backdrop-filter:blur(6px);border:1px solid rgba(212,120,138,.2);border-radius:50%;width:38px;height:38px;color:var(--rose-deep);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.diapo-btn:hover{background:rgba(255,255,255,.95);transform:translateY(-50%) scale(1.1);}
.diapo-btn.prev{left:10px;}.diapo-btn.next{right:10px;}
.diapo-progress{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.3);z-index:10;}
.diapo-progress-bar{height:100%;background:linear-gradient(90deg,var(--emerald-mid),var(--rose-deep));width:0%;transition:width linear;}

.dot-nav{display:flex;justify-content:center;gap:7px;margin-bottom:30px;flex-wrap:wrap;opacity:0;animation:fadeIn .8s ease 1.2s both;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(212,120,138,.3);cursor:pointer;transition:all .3s;}
.dot.on{background:var(--rose-deep);box-shadow:0 0 0 3px rgba(212,120,138,.2);width:20px;border-radius:4px;}
.dot.vid.on{background:var(--emerald);}

/* MESSAGE */
.msg-card{
  background:rgba(255,255,255,.7);
  border:1px solid rgba(212,120,138,.15);
  border-radius:18px;
  padding:28px 26px;
  margin-bottom:28px;
  backdrop-filter:blur(10px);
  box-shadow:0 2px 18px rgba(210,120,138,.08);
  opacity:0;animation:fadeIn .8s ease 1.4s both;
  position:relative;
  overflow:hidden;
}
.msg-card::before{content:'❝';position:absolute;top:-6px;left:14px;font-size:4rem;color:rgba(212,120,138,.12);font-family:'Playfair Display',serif;line-height:1;}
.msg-text{font-size:1.15rem;line-height:1.9;color:var(--text-mid);font-style:italic;position:relative;z-index:1;}

/* HEARTS ROW */
.hearts{display:flex;justify-content:center;gap:14px;margin-bottom:40px;opacity:0;animation:fadeIn .8s ease 1.6s both;}
.heart{font-size:1.6rem;animation:hb 1.6s ease-in-out infinite;}
.heart:nth-child(2){animation-delay:.22s;}.heart:nth-child(3){animation-delay:.44s;}
@keyframes hb{0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}

/* CORNER GEMS */
.corner-gem{position:absolute;opacity:.1;pointer-events:none;}
.corner-gem.tl{top:-10px;left:-10px;transform:rotate(40deg);}
.corner-gem.br{bottom:-10px;right:-10px;transform:rotate(220deg);}

/* CONFETTI */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:50;}
</style>
</head>
<body>

<div id="petals-wrap"></div>
<canvas id="confetti-canvas"></canvas>

<!-- ENVELOPE INTRO -->
<div class="envelope-screen" id="envScreen">
  <div class="env-gem">
    <svg width="90" height="90" viewBox="0 0 100 100">
      <defs>
        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#7fffcc"/><stop offset="45%" stop-color="#2ecc8b"/><stop offset="100%" stop-color="#d4788a"/>
        </linearGradient>
        <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#f2c4ce"/><stop offset="100%" stop-color="#1a6b47"/>
        </linearGradient>
      </defs>
      <polygon points="50,8 78,22 85,50 78,78 50,92 22,78 15,50 22,22" fill="url(#g1)" opacity=".93"/>
      <polygon points="50,19 70,30 76,50 70,70 50,81 30,70 24,50 30,30" fill="url(#g2)" opacity=".55"/>
      <polygon points="50,30 63,37 67,50 63,63 50,70 37,63 33,50 37,37" fill="#fff" opacity=".22"/>
      <polygon points="50,8 78,22 60,31 50,19" fill="#fff" opacity=".32"/>
    </svg>
  </div>
  <div class="env-title">Une surprise t'attend ✨</div>
  <div class="env-sub">quelqu'un tient à toi</div>
  <button class="env-click" onclick="openSurprise()">Ouvrir la surprise 💎</button>
</div>

<!-- ERROR -->
<div class="error-wrap" id="errorWrap" style="display:none">
  <div class="error-box">
    <div style="font-size:3rem;margin-bottom:16px">💎</div>
    <h2>Lien invalide</h2>
    <p>Ce lien de surprise n'est pas valide ou a expiré.</p>
  </div>
</div>

<!-- MAIN SURPRISE -->
<div class="page" id="mainPage" style="display:none">
  <div style="position:relative">
    <svg class="corner-gem tl" width="90" height="90" viewBox="0 0 100 100">
      <polygon points="50,5 80,28 80,72 50,95 20,72 20,28" fill="none" stroke="#2ecc8b" stroke-width="2.5"/>
      <polygon points="50,22 68,36 68,64 50,78 32,64 32,36" fill="rgba(46,204,139,.15)"/>
    </svg>
  </div>

  <div class="gem-center">
    <svg width="88" height="88" viewBox="0 0 100 100">
      <polygon points="50,8 78,22 85,50 78,78 50,92 22,78 15,50 22,22" fill="url(#g1)" opacity=".95"/>
      <polygon points="50,19 70,30 76,50 70,70 50,81 30,70 24,50 30,30" fill="url(#g2)" opacity=".55"/>
      <polygon points="50,30 63,37 67,50 63,63 50,70 37,63 33,50 37,37" fill="#fff" opacity=".22"/>
      <polygon points="50,8 78,22 60,31 50,19" fill="#fff" opacity=".32"/>
    </svg>
  </div>

  <div class="surprise-name" id="surpriseName"></div>
  <div class="hbd-line">Happy Birthday · Joyeux Anniversaire</div>

  <!-- DIAPO -->
  <div class="diapo-wrap" id="diapoWrap">
    <button class="diapo-btn prev" onclick="navSlide(-1)">‹</button>
    <button class="diapo-btn next" onclick="navSlide(1)">›</button>
    <div class="slide-badge" id="slideBadge"></div>
    <div class="slide-overlay"></div>
    <div class="diapo-progress"><div class="diapo-progress-bar" id="progressBar"></div></div>
    <div id="slidesBox"></div>
  </div>
  <div class="dot-nav" id="dotNav"></div>

  <!-- MESSAGE -->
  <div class="msg-card">
    <p class="msg-text" id="surpriseMsg"></p>
  </div>

  <div class="hearts">
    <span class="heart">🌸</span>
    <span class="heart">💎</span>
    <span class="heart">🌿</span>
  </div>

  <div style="position:relative">
    <svg class="corner-gem br" width="90" height="90" viewBox="0 0 100 100">
      <polygon points="50,5 80,28 80,72 50,95 20,72 20,28" fill="none" stroke="#d4788a" stroke-width="2.5"/>
      <polygon points="50,22 68,36 68,64 50,78 32,64 32,36" fill="rgba(212,120,138,.15)"/>
    </svg>
  </div>
</div>

<script>
// Petals
const pw=document.getElementById('petals-wrap');
for(let i=0;i<18;i++){
  const p=document.createElement('div');p.className='petal';const s=8+Math.random()*14;
  Object.assign(p.style,{width:s+'px',height:s+'px',left:Math.random()*100+'vw',
    background:Math.random()>.5?'rgba(242,196,206,.7)':'rgba(225,245,238,.65)',
    animationDuration:(12+Math.random()*14)+'s',animationDelay:(Math.random()*14)+'s'});
  pw.appendChild(p);
}

// Parse data
let surpriseData=null;
try{
  const hash=location.hash.slice(1);
  if(!hash) throw new Error('no data');
  surpriseData=JSON.parse(decodeURIComponent(escape(atob(hash))));
} catch(e){
  document.getElementById('errorWrap').style.display='flex';
  document.getElementById('envScreen').style.display='none';
}

function openSurprise(){
  document.getElementById('envScreen').classList.add('gone');
  setTimeout(()=>{
    document.getElementById('envScreen').style.display='none';
    document.getElementById('mainPage').style.display='block';
    buildPage();
    setTimeout(fireConfetti,600);
  },800);
}

function buildPage(){
  const d=surpriseData;
  document.getElementById('surpriseName').textContent=d.name||'Mon Amour';
  document.getElementById('surpriseMsg').textContent=d.msg||'';
  buildDiapo(d.media||[]);
}

// DIAPO
let cur=0,slides=[],diapoTimer=null;
const DELAY=4500;

function buildDiapo(mediaArr){
  const box=document.getElementById('slidesBox');
  const dotNav=document.getElementById('dotNav');
  box.innerHTML='';dotNav.innerHTML='';slides=[];cur=0;

  const prevBtn=document.querySelector('.diapo-btn.prev');
  const nextBtn=document.querySelector('.diapo-btn.next');
  if(mediaArr.length<=1){prevBtn.style.display='none';nextBtn.style.display='none';}

  mediaArr.forEach((m,i)=>{
    const s=document.createElement('div');
    s.className='slide'+(i===0?' active':'');
    s.dataset.type=m.type;
    if(m.type==='image'){
      s.innerHTML=`<img src="${m.url}" loading="lazy">`;
    } else {
      s.innerHTML=`<video src="${m.url}" controls playsinline preload="metadata" style="width:100%;height:100%;object-fit:cover;"></video>`;
    }
    box.appendChild(s);slides.push(s);

    const d=document.createElement('div');
    d.className='dot'+(i===0?' on':'')+(m.type==='video'?' vid':'');
    d.onclick=()=>goTo(i);
    dotNav.appendChild(d);
  });

  updateBadge(mediaArr);
  if(mediaArr.length>1) startAuto(mediaArr);
}

function goTo(i){
  clearTimeout(diapoTimer);
  const vid=slides[cur].querySelector('video');if(vid)vid.pause();
  slides[cur].classList.remove('active');
  const dots=document.getElementById('dotNav').children;
  dots[cur].classList.remove('on');
  cur=i;
  slides[cur].classList.add('active');
  dots[cur].classList.add('on');
  updateBadge(surpriseData.media);
  resetProgress();
  if(surpriseData.media.length>1){
    if(surpriseData.media[cur].type==='video'){
      const v=slides[cur].querySelector('video');
      if(v){v.play().catch(()=>{});v.onended=()=>{cur=(cur+1)%slides.length;goTo(cur);};}
    } else startAuto(surpriseData.media);
  }
}
function navSlide(d){goTo((cur+d+slides.length)%slides.length);}

function startAuto(mediaArr){
  resetProgress();animProgress();
  diapoTimer=setTimeout(()=>{
    if(mediaArr[cur].type!=='video') goTo((cur+1)%slides.length);
  },DELAY);
}

function resetProgress(){
  const bar=document.getElementById('progressBar');
  bar.style.transition='none';bar.style.width='0%';
}
function animProgress(){
  const bar=document.getElementById('progressBar');
  requestAnimationFrame(()=>{bar.style.transition=`width ${DELAY}ms linear`;bar.style.width='100%';});
}
function updateBadge(mediaArr){
  const b=document.getElementById('slideBadge');
  if(!mediaArr||!mediaArr.length){b.style.display='none';return;}
  b.style.display='block';
  b.textContent=mediaArr[cur].type==='video'?'🎥 Vidéo':'📷 Photo';
}

// CONFETTI
const cc=document.getElementById('confetti-canvas');
const cx=cc.getContext('2d');
let cfParts=[],cfFrame,cfOn=false;
function fireConfetti(){
  cc.width=window.innerWidth;cc.height=window.innerHeight;cfParts=[];cfOn=true;
  const cols=['#2ecc8b','#7fffcc','#f2c4ce','#d4788a','#b8892a','#fff','#1a6b47'];
  for(let i=0;i<160;i++){cfParts.push({x:Math.random()*cc.width,y:-20-Math.random()*100,r:Math.random()*6+2.5,c:cols[Math.floor(Math.random()*cols.length)],vy:Math.random()*3+1.5,vx:Math.random()*2.5-1.25,op:1,sh:Math.random()>.45?'gem':'circle'});}
  drawCF();setTimeout(()=>{cfOn=false;cancelAnimationFrame(cfFrame);cx.clearRect(0,0,cc.width,cc.height);},5000);
}
function drawCF(){
  if(!cfOn)return;cx.clearRect(0,0,cc.width,cc.height);cfParts=cfParts.filter(p=>p.op>0);
  cfParts.forEach(p=>{
    p.y+=p.vy;p.x+=p.vx;if(p.y>cc.height*.72)p.op-=.018;
    cx.globalAlpha=p.op;cx.fillStyle=p.c;
    if(p.sh==='circle'){cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();}
    else{cx.save();cx.translate(p.x,p.y);cx.rotate(p.y*.04);cx.beginPath();const s=p.r;cx.moveTo(0,-s);cx.lineTo(s*.65,-s*.4);cx.lineTo(s*.65,s*.4);cx.lineTo(0,s);cx.lineTo(-s*.65,s*.4);cx.lineTo(-s*.65,-s*.4);cx.closePath();cx.fill();cx.restore();}
  });
  cx.globalAlpha=1;cfFrame=requestAnimationFrame(drawCF);
}
</script>
</body>
</html>
